<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель адміністратора | ІС «Замовлення їжі»</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --danger: #e74c3c;
            --success: #27ae60;
            --light: #ecf0f1;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--light); margin: 0; padding: 20px; color: var(--primary); }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }

        h1 { border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .nav-link { text-decoration: none; color: var(--accent); font-weight: bold; margin-bottom: 20px; display: inline-block; }

        /* Стиль форми додавання */
        .add-card { background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 5px solid var(--success); }
        input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; margin-right: 10px; }

        /* Стиль таблиці */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background-color: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f5f5f5; }

        /* Кнопки */
        button { cursor: pointer; border: none; border-radius: 4px; padding: 8px 15px; transition: 0.3s; }
        .btn-update { background-color: var(--accent); color: white; }
        .btn-update:hover { background-color: #2980b9; }
        .btn-add { background-color: var(--success); color: white; height: 36px; }
        .btn-del { background-color: var(--danger); color: white; text-decoration: none; padding: 7px 12px; font-size: 14px; border-radius: 4px; display: inline-block; }
        .btn-del:hover { background-color: #c0392b; }

        .form-inline { display: flex; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍🍳 Керування меню</h1>
    <a href="/" class="nav-link">← На головну (Меню користувача)</a>

    <div class="add-card">
        <h3>Додати нову страву</h3>
        <form action="/admin/dish/create" method="post" class="form-inline">
            <input type="text" name="name" placeholder="Назва страви" required>
            <input type="number" step="0.01" name="price" placeholder="Ціна (грн)" required>
            <button type="submit" class="btn-add">➕ Додати в меню</button>
        </form>
    </div>

    <h3>Поточний асортимент</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Назва страви</th>
                <th>Ціна (грн)</th>
                <th>Дії</th>
            </tr>
        </thead>
        <tbody>
            {% for dish in dishes %}
            <tr>
                <td>{{ dish.id }}</td>
                <form action="/admin/dish/update/{{ dish.id }}" method="post">
                    <td>
                        <input type="text" name="name" value="{{ dish.name }}" style="width: 80%;">
                    </td>
                    <td>
                        <input type="number" step="0.01" name="price" value="{{ dish.price }}" style="width: 80px;">
                    </td>
                    <td>
                        <button type="submit" class="btn-update">Зберегти</button>
                        <a href="/admin/dish/delete/{{ dish.id }}"
                           class="btn-del"
                           onclick="return confirm('Ви впевнені, що хочете видалити {{ dish.name }}?')">
                           Видалити
                        </a>
                    </td>
                </form>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <div style="margin-bottom: 20px;">
    <a href="/admin/stats"
       style="background-color: #28a745; color: white; padding: 10px 20px;
              text-decoration: none; border-radius: 5px; font-family: sans-serif;">
       📊 Переглянути статистику продажів
    </a>
    </div>
</div>



</body>
</html>
