<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню ресторану | ІС «Замовлення їжі»</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f8f9fa;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        .menu-item:hover { transform: translateY(-5px); }
        .price { color: var(--accent); font-weight: bold; font-size: 1.2em; }

        .btn-cart {
            background: var(--primary); color: white; border: none;
            padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%;
            margin-top: 10px; font-weight: bold;
        }
        .btn-cart:hover { background: #34495e; }
        .admin-link { color: #7f8c8d; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍴 Наше Меню</h1>
        <a href="/admin" class="admin-link">Увійти як адмін</a>
    </header>

    <div class="menu-grid">
        {% for dish in dishes %}
        <div class="menu-item">
            <h3>{{ dish.name }}</h3>
            <p class="price">{{ dish.price }} грн</p>

            <form action="/add_to_cart" method="post">
                <input type="hidden" name="dish_id" value="{{ dish.id }}">
                <input type="hidden" name="user_id" value="1">
                <button type="submit" class="btn-cart">🛒 Додати у кошик</button>
            </form>
        </div>
        {% endfor %}
    </div>

    {% if not dishes %}
    <p style="text-align: center; color: #7f8c8d;">Меню наразі порожнє. Зайдіть в адмін-панель, щоб додати страви.</p>
    {% endif %}
</div>

</body>
</html>
